openapi: 3.1.0
info:
  title: skelm gateway
  description: |
    Control plane and runs surface for the skelm gateway. The gateway is the
    trust boundary — every privileged action is enforced and audited here.
  version: 0.3.9
  license:
    name: MIT
servers:
  - url: http://127.0.0.1:14738
    description: Default local gateway
security:
  - bearerAuth: []

paths:
  /health:
    get:
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ok] }

  /metrics:
    get:
      summary: Prometheus metrics
      security: []
      responses:
        '200':
          description: text/plain Prometheus exposition format

  /gateway/pause:
    post:
      summary: Stop accepting new runs
      responses:
        '204': { description: Paused }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /gateway/resume:
    post:
      summary: Resume accepting new runs
      responses:
        '204': { description: Resumed }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /gateway/reload:
    post:
      summary: Re-read pipelines and config
      responses:
        '204': { description: Reloaded }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /pipelines:
    get:
      summary: List registered pipelines
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PipelineSummary' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /pipelines/{id}:
    get:
      summary: Describe one pipeline
      parameters:
        - $ref: '#/components/parameters/PipelineId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PipelineDescription' }
        '404': { $ref: '#/components/responses/NotFound' }

  /pipelines/{id}/run:
    post:
      summary: Run a pipeline synchronously
      parameters:
        - $ref: '#/components/parameters/PipelineId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                input: {}
      responses:
        '200':
          description: Run completed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '422':
          description: Schema validation failure
        '500':
          description: Run failed at runtime

  /pipelines/{id}/start:
    post:
      summary: Start an asynchronous run
      parameters:
        - $ref: '#/components/parameters/PipelineId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                input: {}
      responses:
        '202':
          description: Run accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  runId: { type: string }

  /runs/{runId}:
    get:
      summary: Get run record
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '404': { $ref: '#/components/responses/NotFound' }

  /runs/{runId}/events:
    get:
      summary: Stream events for a run
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: text/event-stream of run events

  /runs/{runId}/resume:
    post:
      summary: Resume a waiting run
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json: { schema: {} }
      responses:
        '200': { description: Resumed }

  /runs/{runId}/approve:
    post:
      summary: Approve a paused approval gate
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200': { description: Approved }

  /runs/{runId}/deny:
    post:
      summary: Deny a paused approval gate
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200': { description: Denied }

  /approvals:
    get:
      summary: List pending approvals
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Approval' }

  /triggers:
    get:
      summary: List triggers
      responses:
        '200': { description: OK }

  /triggers/{id}/fire:
    post:
      summary: Fire a trigger manually
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Fired }

  /schedules:
    get:
      summary: List schedules
      responses:
        '200': { description: OK }
    post:
      summary: Add a schedule
      responses:
        '201': { description: Created }

  /schedules/{id}:
    delete:
      summary: Remove a schedule
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204': { description: Removed }

  /sessions:
    get:
      summary: List ACP sessions
      responses:
        '200': { description: OK }

  /sessions/{id}:
    get:
      summary: Get one session
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
    delete:
      summary: Drop a session
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204': { description: Dropped }

  /sessions/{id}/resume:
    post:
      summary: Resume a session
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Resumed }

  /sessions/prune:
    post:
      summary: Prune expired or old sessions
      responses:
        '200': { description: Pruned }

  /debug/breakpoints:
    get:
      summary: List active breakpoints
      responses:
        '200': { description: OK }
    post:
      summary: Add a breakpoint
      responses:
        '201': { description: Created }

  /debug/breakpoints/{stepId}:
    delete:
      summary: Remove a breakpoint
      parameters:
        - in: path
          name: stepId
          required: true
          schema: { type: string }
      responses:
        '204': { description: Removed }

  /debug/runs:
    get:
      summary: List runs paused at breakpoints
      responses:
        '200': { description: OK }

  /debug/runs/{runId}/release:
    post:
      summary: Release a paused run
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200': { description: Released }

  /v1/dashboard/overview:
    get:
      summary: Dashboard overview snapshot
      responses:
        '200':
          description: Overview
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardOverview' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/dashboard/workflows:
    get:
      summary: Per-workflow run statistics
      responses:
        '200':
          description: Workflow stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflows:
                    type: array
                    items: { $ref: '#/components/schemas/DashboardWorkflowStats' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/dashboard/runs:
    get:
      summary: Filtered run list
      parameters:
        - in: query
          name: workflowId
          schema: { type: string }
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, running, waiting, completed, failed, cancelled]
        - in: query
          name: dateFrom
          schema: { type: integer, format: int64, description: 'Inclusive lower bound on startedAt (epoch ms)' }
        - in: query
          name: dateTo
          schema: { type: integer, format: int64 }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        '200':
          description: Runs
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items: { $ref: '#/components/schemas/DashboardRunListItem' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/dashboard/analytics:
    get:
      summary: Time-bucketed analytics
      parameters:
        - in: query
          name: metric
          required: true
          schema:
            type: string
            enum: [runs-per-hour, success-rate, avg-duration]
        - in: query
          name: resolution
          schema:
            type: string
            enum: [hour, day, week]
            default: hour
        - in: query
          name: dateFrom
          schema: { type: integer, format: int64 }
        - in: query
          name: dateTo
          schema: { type: integer, format: int64 }
        - in: query
          name: workflowId
          schema: { type: string }
      responses:
        '200':
          description: Analytics
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardAnalytics' }
        '400': { description: Invalid metric, resolution, or date range }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/dashboard/errors:
    get:
      summary: Recent failures and groupings
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 25 }
      responses:
        '200':
          description: Errors
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardErrors' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/dashboard/schedules:
    get:
      summary: Schedule/trigger status
      responses:
        '200':
          description: Schedules
          content:
            application/json:
              schema:
                type: object
                properties:
                  schedules:
                    type: array
                    items: { $ref: '#/components/schemas/DashboardScheduleStatus' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/dashboard/approvals:
    get:
      summary: Pending approvals with ages
      responses:
        '200':
          description: Approvals
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardApprovals' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/workflows/health:
    get:
      summary: Workflow health and readiness
      parameters:
        - in: query
          name: recentFailuresLimit
          schema:
            type: integer
            minimum: 0
            maximum: 100
            default: 5
      responses:
        '200':
          description: Workflow health list
          content:
            application/json:
              schema:
                type: object
                properties:
                  generatedAt: { type: string, format: date-time }
                  gateway:
                    type: object
                    properties:
                      state: { type: string }
                      ready: { type: boolean }
                  workflows:
                    type: array
                    items: { $ref: '#/components/schemas/WorkflowHealth' }
        '400': { description: Invalid recentFailuresLimit }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/workflows/{id}/health:
    get:
      summary: Single workflow health and readiness
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: recentFailuresLimit
          schema:
            type: integer
            minimum: 0
            maximum: 100
            default: 5
      responses:
        '200':
          description: Workflow health
          content:
            application/json:
              schema:
                type: object
                properties:
                  generatedAt: { type: string, format: date-time }
                  gateway:
                    type: object
                    properties:
                      state: { type: string }
                      ready: { type: boolean }
                  workflow: { $ref: '#/components/schemas/WorkflowHealth' }
        '400': { description: Invalid workflow id or recentFailuresLimit }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  parameters:
    PipelineId:
      in: path
      name: id
      required: true
      schema: { type: string }
    RunId:
      in: path
      name: runId
      required: true
      schema: { type: string }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
    NotFound:
      description: Resource not found

  schemas:
    PipelineSummary:
      type: object
      properties:
        id: { type: string }
        version: { type: string }
    PipelineDescription:
      type: object
      properties:
        id: { type: string }
        steps:
          type: array
          items: { type: object }
    Run:
      type: object
      properties:
        runId: { type: string }
        pipelineId: { type: string }
        status:
          type: string
          enum: [queued, running, waiting, completed, failed, cancelled]
        output: {}
        error:
          type: object
          properties:
            message: { type: string }
            code: { type: string }
    Approval:
      type: object
      properties:
        runId: { type: string }
        stepId: { type: string }
        message: { type: string }
        createdAt: { type: string, format: date-time }

    DashboardOverview:
      type: object
      properties:
        gateway:
          type: object
          properties:
            status: { type: string, enum: [running] }
            uptimeMs: { type: integer }
            version: { type: string }
            startedAt: { type: integer, format: int64 }
        workflows:
          type: object
          properties:
            total: { type: integer }
            withRecentFailures: { type: integer }
        runs:
          type: object
          properties:
            total: { type: integer }
            byStatus:
              type: object
              additionalProperties: { type: integer }
            avgDurationMs: { type: integer, nullable: true }
            last24h: { type: integer }
        schedules:
          type: object
          properties:
            total: { type: integer }
            inflight: { type: integer }
            withErrors: { type: integer }
        approvals:
          type: object
          properties:
            pending: { type: integer }
            oldestPendingAgeMs: { type: integer, nullable: true }
        errors:
          type: object
          properties:
            last24h: { type: integer }
            recent:
              type: array
              items:
                type: object
                properties:
                  runId: { type: string }
                  pipelineId: { type: string }
                  message: { type: string }
                  at: { type: integer, format: int64 }

    DashboardWorkflowStats:
      type: object
      properties:
        id: { type: string }
        file: { type: string }
        totalRuns: { type: integer }
        lastRunAt: { type: integer, format: int64, nullable: true }
        lastStatus:
          type: string
          enum: [pending, running, waiting, completed, failed, cancelled]
          nullable: true
        successRate: { type: number, nullable: true }

    DashboardRunListItem:
      type: object
      properties:
        runId: { type: string }
        pipelineId: { type: string }
        status:
          type: string
          enum: [pending, running, waiting, completed, failed, cancelled]
        startedAt: { type: integer, format: int64 }
        completedAt: { type: integer, format: int64 }
        durationMs: { type: integer }

    DashboardAnalytics:
      type: object
      properties:
        metric: { type: string, enum: [runs-per-hour, success-rate, avg-duration] }
        resolution: { type: string, enum: [hour, day, week] }
        dateFrom: { type: integer, format: int64 }
        dateTo: { type: integer, format: int64 }
        workflowId: { type: string }
        points:
          type: array
          items:
            type: object
            properties:
              bucketStart: { type: integer, format: int64 }
              value: { type: number }

    DashboardErrors:
      type: object
      properties:
        last24h: { type: integer }
        recent:
          type: array
          items:
            type: object
            properties:
              runId: { type: string }
              pipelineId: { type: string }
              message: { type: string }
              at: { type: integer, format: int64 }
        topGroups:
          type: array
          items:
            type: object
            properties:
              pipelineId: { type: string }
              message: { type: string }
              count: { type: integer }
              lastAt: { type: integer, format: int64 }

    DashboardScheduleStatus:
      type: object
      properties:
        id: { type: string }
        kind: { type: string }
        workflowId: { type: string }
        fired: { type: integer }
        inflight: { type: boolean }
        queued: { type: integer }
        dropped: { type: integer }
        runningCount: { type: integer }
        lastFiredAt: { type: string, format: date-time, nullable: true }
        nextFireAt: { type: string, format: date-time, nullable: true }
        lastOutcome: { type: string, nullable: true }
        lastOverlapDecision: { type: string, nullable: true }
        lastError: { type: string, nullable: true }
        lastErrorAt: { type: string, format: date-time, nullable: true }

    DashboardApprovals:
      type: object
      properties:
        pendingCount: { type: integer }
        oldestPendingAgeMs: { type: integer, nullable: true }
        pending:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              createdAt: { type: string, format: date-time }
              ageMs: { type: integer }
              request: {}

    WorkflowHealth:
      type: object
      properties:
        id: { type: string }
        file: { type: string }
        source: { type: string, enum: [registered, glob] }
        pipelineId: { type: string }
        description: { type: string }
        version: { type: string }
        readiness:
          type: object
          properties:
            status: { type: string, enum: [ready, degraded, broken] }
            ready: { type: boolean }
            reason: { type: string }
            checks:
              type: object
              properties:
                gateway: { type: boolean }
                registered: { type: boolean }
                loadable:
                  type: boolean
                  nullable: true
                  description: Null means loadability was unchecked because no workflow loader was configured.
                hasRecentFailures: { type: boolean }
                hasTriggerErrors: { type: boolean }
        runs:
          type: object
          properties:
            total: { type: integer }
            active: { type: integer }
            truncated:
              type: boolean
              description: True when run counts and refs are based on the bounded health scan window.
            byStatus:
              type: object
              additionalProperties: { type: integer }
            recentFailures:
              type: array
              items:
                type: object
                properties:
                  runId: { type: string }
                  pipelineId: { type: string }
                  message: { type: string }
                  at: { type: integer, format: int64 }
        activeRuns:
          type: array
          items:
            type: object
            properties:
              runId: { type: string }
              pipelineId: { type: string }
              status:
                type: string
                enum: [pending, running, waiting, completed, failed, cancelled]
              startedAt: { type: integer, format: int64 }
              triggerId: { type: string }
        triggers:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              kind: { type: string }
              overlap: { type: string }
              fired: { type: integer }
              inflight: { type: boolean }
              queueDepth: { type: integer }
              runningCount: { type: integer }
              lastFiredAt: { type: string, format: date-time, nullable: true }
              lastError: { type: string, nullable: true }
