name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # Run the exact same gate locally and in CI. Matches `pnpm check` —
    # build, typecheck, lint, guards (public-export-baseline,
    # default-deny-permissions, gateway-only-enforcement, docs-orphans),
    # and tests. No `continue-on-error` anywhere: the first red step
    # fails the job, which is what makes this a real merge gate.
    #
    # Branch protection should require this job to pass before merge.
    # See scripts/check-pre-push.sh for the same gate as a local hook.
    name: pnpm check (build / typecheck / lint / guards / test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22.18.0', '24.3.0', '25.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Guards (default-deny, public-export-baseline, gateway-only, docs)
        run: pnpm guards

      - name: Test
        run: pnpm test
