name: Publish to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.3.2)'
        required: true
        default: '0.3.2'
        type: string
      dry-run:
        description: 'Dry run (verify without publishing)'
        required: false
        default: 'false'
        type: boolean

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@scottgl9'

      - name: Install dependencies
        run: pnpm install

      - name: Determine version from release tag or manual input
        id: version
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG_VERSION="${{ github.event.release.tag_name }}"
            TAG_VERSION="${TAG_VERSION#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            TAG_VERSION="${{ github.event.inputs.version }}"
          else
            TAG_VERSION="0.3.2"
          fi
          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $TAG_VERSION"

      - name: Update package versions
        run: |
          TAG_VERSION="${{ steps.version.outputs.tag_version }}"
          for pkg in core cli opencode pi gateway skelm; do
            (cd packages/$pkg && npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version)
          done

      - name: Rescope package names to @scottgl9
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const pkgs = ['core','cli','opencode','pi','gateway','skelm'];
          const renameMap = {
            '@skelm/core': '@scottgl9/core',
            '@skelm/cli': '@scottgl9/cli',
            '@skelm/opencode': '@scottgl9/opencode',
            '@skelm/pi': '@scottgl9/pi',
            '@skelm/gateway': '@scottgl9/gateway',
            'skelm': '@scottgl9/skelm',
          };
          for (const p of pkgs) {
            const file = path.join('packages', p, 'package.json');
            const json = JSON.parse(fs.readFileSync(file, 'utf8'));
            if (renameMap[json.name]) json.name = renameMap[json.name];
            for (const depKey of ['dependencies','devDependencies','peerDependencies','optionalDependencies']) {
              if (!json[depKey]) continue;
              for (const [k, v] of Object.entries(json[depKey])) {
                if (renameMap[k]) {
                  json[depKey][renameMap[k]] = v;
                  delete json[depKey][k];
                }
              }
            }
            if (json.publishConfig) json.publishConfig.registry = 'https://npm.pkg.github.com';
            fs.writeFileSync(file, JSON.stringify(json, null, 2) + '\n');
            console.log('rescoped', file, '->', json.name);
          }
          EOF

      - name: Build all packages
        run: pnpm build

      - name: Dry run summary
        if: inputs.dry-run == 'true'
        run: |
          for p in core cli opencode pi gateway skelm; do
            echo "  $(node -p "require('./packages/$p/package.json').name")@$(node -p "require('./packages/$p/package.json').version")"
          done

      - name: Publish all packages
        if: inputs.dry-run != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for p in core cli opencode pi gateway skelm; do
            (cd packages/$p && \
              echo "Publishing $(node -p "require('./package.json').name")@$(node -p "require('./package.json').version")" && \
              npm publish --registry=https://npm.pkg.github.com --access=public)
          done

      - name: Success summary
        if: inputs.dry-run != 'true'
        run: |
          echo "Published version ${{ steps.version.outputs.tag_version }} to https://npm.pkg.github.com under @scottgl9/*"
