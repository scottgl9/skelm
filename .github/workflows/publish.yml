name: Publish to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (verify without publishing)'
        required: false
        default: 'false'
        type: boolean

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Determine version from release tag
        id: version
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG_VERSION="${{ github.event.release.tag_name }}"
            TAG_VERSION="${TAG_VERSION#v}"
            echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
            echo "Release tag detected: $TAG_VERSION"
          else
            echo "tag_version=" >> $GITHUB_OUTPUT
            echo "No release tag found (manual dispatch)"
          fi

      - name: Update package versions (if release tag)
        if: steps.version.outputs.tag_version != ''
        run: |
          TAG_VERSION="${{ steps.version.outputs.tag_version }}"
          echo "Updating all packages to version: $TAG_VERSION"
          
          # Update core
          cd packages/core
          npm version $TAG_VERSION --no-git-tag-version --force
          cd ..
          
          # Update cli
          cd packages/cli
          npm version $TAG_VERSION --no-git-tag-version --force
          cd ..
          
          # Update opencode
          cd packages/opencode
          npm version $TAG_VERSION --no-git-tag-version --force
          cd ..
          
          # Update pi
          cd packages/pi
          npm version $TAG_VERSION --no-git-tag-version --force
          cd ..
          
          # Update server
          cd packages/server
          npm version $TAG_VERSION --no-git-tag-version --force
          cd ..
          
          # Update main skelm package
          cd packages/skelm
          npm version $TAG_VERSION --no-git-tag-version --force
          cd ..

      - name: Dry run - show what would be published
        if: inputs.dry-run == true || steps.version.outputs.tag_version == ''
        run: |
          echo "=== Dry Run Mode ==="
          echo ""
          echo "Packages to publish:"
          echo "  - @skelm/core@$(cat packages/core/package.json | grep '"version"' | cut -d'"' -f4)"
          echo "  - @skelm/cli@$(cat packages/cli/package.json | grep '"version"' | cut -d'"' -f4)"
          echo "  - @skelm/opencode@$(cat packages/opencode/package.json | grep '"version"' | cut -d'"' -f4)"
          echo "  - @skelm/pi@$(cat packages/pi/package.json | grep '"version"' | cut -d'"' -f4)"
          echo "  - @skelm/server@$(cat packages/server/package.json | grep '"version"' | cut -d'"' -f4)"
          echo "  - skelm@$(cat packages/skelm/package.json | grep '"version"' | cut -d'"' -f4)"
          echo ""
          echo "Registry: https://npm.pkg.github.com/scottgl9"
          echo ""
          echo "To actually publish, create a GitHub release with a version tag (e.g., v0.3.0)"
          echo "The workflow will automatically publish all packages with that version."

      - name: Publish @skelm/core
        if: inputs.dry-run != true && steps.version.outputs.tag_version != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/core
          echo "Publishing @skelm/core@$(node -p "require('./package.json').version")"
          npm publish --registry=https://npm.pkg.github.com/scottgl9 --access=public
          cd ..

      - name: Publish @skelm/cli
        if: inputs.dry-run != true && steps.version.outputs.tag_version != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/cli
          echo "Publishing @skelm/cli@$(node -p "require('./package.json').version")"
          npm publish --registry=https://npm.pkg.github.com/scottgl9 --access=public
          cd ..

      - name: Publish @skelm/opencode
        if: inputs.dry-run != true && steps.version.outputs.tag_version != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/opencode
          echo "Publishing @skelm/opencode@$(node -p "require('./package.json').version")"
          npm publish --registry=https://npm.pkg.github.com/scottgl9 --access=public
          cd ..

      - name: Publish @skelm/pi
        if: inputs.dry-run != true && steps.version.outputs.tag_version != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/pi
          echo "Publishing @skelm/pi@$(node -p "require('./package.json').version")"
          npm publish --registry=https://npm.pkg.github.com/scottgl9 --access=public
          cd ..

      - name: Publish @skelm/server
        if: inputs.dry-run != true && steps.version.outputs.tag_version != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/server
          echo "Publishing @skelm/server@$(node -p "require('./package.json').version")"
          npm publish --registry=https://npm.pkg.github.com/scottgl9 --access=public
          cd ..

      - name: Publish skelm
        if: inputs.dry-run != true && steps.version.outputs.tag_version != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/skelm
          echo "Publishing skelm@$(node -p "require('./package.json').version")"
          npm publish --registry=https://npm.pkg.github.com/scottgl9 --access=public
          cd ..

      - name: Publish success summary
        if: inputs.dry-run != true && steps.version.outputs.tag_version != ''
        run: |
          echo "✅ Successfully published all packages to GitHub Packages!"
          echo ""
          echo "Packages available at:"
          echo "  https://npm.pkg.github.com/scottgl9/@skelm/core"
          echo "  https://npm.pkg.github.com/scottgl9/@skelm/cli"
          echo "  https://npm.pkg.github.com/scottgl9/@skelm/opencode"
          echo "  https://npm.pkg.github.com/scottgl9/@skelm/pi"
          echo "  https://npm.pkg.github.com/scottgl9/@skelm/server"
          echo "  https://npm.pkg.github.com/scottgl9/skelm"
          echo ""
          echo "Version: ${{ steps.version.outputs.tag_version }}"
