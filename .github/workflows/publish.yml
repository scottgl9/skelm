name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.3.3)'
        required: true
        default: '0.3.3'
        type: string
      dry-run:
        description: 'Dry run (verify without publishing)'
        required: false
        default: 'false'
        type: boolean

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG_VERSION="${{ github.event.release.tag_name }}"
            TAG_VERSION="${TAG_VERSION#v}"
          else
            TAG_VERSION="${{ github.event.inputs.version }}"
          fi
          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $TAG_VERSION"

      - name: Sync package versions
        run: |
          TAG_VERSION="${{ steps.version.outputs.tag_version }}"
          for pkg in core cli gateway scheduler integrations metrics opencode otel pi skelm; do
            (cd "packages/$pkg" && npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version)
          done

      - name: Build all packages
        run: pnpm build

      - name: Run gates
        run: pnpm typecheck && pnpm test

      - name: Publish (dry run)
        if: inputs.dry-run == 'true'
        run: |
          for pkg in core cli gateway scheduler integrations metrics opencode otel pi skelm; do
            (cd "packages/$pkg" && npm publish --dry-run --access public)
          done

      - name: Publish to npm
        if: inputs.dry-run != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Publish in dependency order: core first, then leaf backends, then cli/gateway/skelm.
          for pkg in core scheduler integrations metrics otel opencode pi gateway cli skelm; do
            (cd "packages/$pkg" && \
              echo "Publishing $(node -p "require('./package.json').name")@$(node -p "require('./package.json').version")" && \
              npm publish --access public --provenance)
          done

      - name: Success summary
        if: inputs.dry-run != 'true'
        run: |
          echo "Published version ${{ steps.version.outputs.tag_version }} to https://registry.npmjs.org"
